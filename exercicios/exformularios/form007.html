<!DOCTYPE html>
<html lang="pt-br">
<head>

    <title>Pagotário</title>
</head>
<body>
    <h1>Exemplo de formulario</h1>
    <p>
        <label for="iest">estado:</label>
        <select name="estado" id="iest">

                <option value="mg">Minas Gerais</option>

        </select>
    </p>
         <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>
</body>
