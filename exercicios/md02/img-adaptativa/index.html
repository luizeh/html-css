<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>imagem</title>
</head>
<body>
    <h1>Imagem dinâmica</h1>
    <p>tente abrir esse site em varios dispositivos diferentes ou simplismente aumente e diminua o tamanho do seu navegador.</p>

    <picture>
        <source media="(max-width:750px)" srcset="imgs/img-p.png" type="image/png">
        <source media="(max-width:1050px)" srcset="imgs/img-m.png" type="image/png"> <!--adaptar imagens para todos os dispositivos-->
        <img src="imgs/img-g.png" alt="imagem flexivel">
    </picture>
</body>
</html>
