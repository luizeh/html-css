<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flexible box</title>
    <style>
      div.container {
        background-color: grey;
        display: flex;
        flex-flow: row wrap;
      }

      div.item {
        background-color: lightgrey;
        border: 1px solid black;
        text-align: center;
        padding: 20px;
      }

      
      #i1{
        order: -1;
      }
      #i2{
        order: 6;
      }
      #i3{
        order: 5;
      }
      #i4{
        order: 4;
      }
      #i5{
        order: 3;
      }
      #i6{
        order: 2;
      }
      #i7{
        order: 1;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="item" id="i1">A</div>
      <div class="item" id="i2">B</div>
      <div class="item" id="i3">C</div>
      <div class="item" id="i4">D</div>
      <div class="item" id="i5">E</div>
      <div class="item" id="i6">F</div>
      <div class="item" id="i7">G</div>
    </div>
  </body>
</html>
