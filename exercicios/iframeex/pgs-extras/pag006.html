<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JavaScript</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;

font-family:Arial;
color:white;

background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
}

/* card central */
.container{

background:rgba(255,255,255,0.05);
backdrop-filter:blur(15px);

padding:40px;
border-radius:20px;

box-shadow:0 0 40px rgba(0,0,0,0.5);

text-align:center;

animation:fade 1s ease;

}

/* botão */
a{

display:inline-block;
padding:15px 30px;

border-radius:12px;

text-decoration:none;
font-weight:bold;

color:white;

background:linear-gradient(45deg,#00c6ff,#0072ff);

transition:0.3s;

}

/* hover bonito */
a:hover{

transform:scale(1.1);
background:linear-gradient(45deg,#ff7e5f,#feb47b);

}

/* saída */
#saida{

margin-top:25px;
max-height:200px;
overflow:auto;

}

/* mensagens */
#saida p{

background:rgba(0,0,0,0.4);
padding:10px;
border-radius:10px;

margin:10px 0;

animation:slide 0.4s ease;

}

/* animações */
@keyframes fade{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

@keyframes slide{
from{
opacity:0;
transform:translateX(-20px);
}
to{
opacity:1;
transform:translateX(0);
}
}

</style>
</head>

<body>

<div class="container">

<h1>clique no botão 😮‍💨🔥</h1>

<a href="#" onclick="clicou()">receba</a>

<div id="saida"></div>

</div>

<script>

function clicou() {
   let s = document.getElementById("saida");
   s.innerHTML += '<p>você clicou no link 🗣️🔥</p>';
}

</script>

</body>
</html>
