<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio 3 tabelas</title>
        <style>
               body{
            font-family: Arial, Helvetica, sans-serif;
        }
        table{
            width: 300px;
            text-align: center;
            border-collapse: collapse;
        }
        td, th{
            border: 1px solid black;
            padding: 10px; 
        }
        th{
            white-space: nowrap;
        }
        .media{
             background-color: gray;
            color: white;
        }
        .medias{
            text-align: left;
            background-color: gray;
            color: white;
        }
    </style>
</head>
</head>
<body>
    <table>
        <thead>
            <tr>
                <th rowspan="2" class="media">Área</th>
                <th rowspan="2" class="media">Disciplinas</th>
                <th colspan="2" class="media">Notas</th>
                <th rowspan="2" class="media">Média</th>
            </tr>
            <tr>
                <th class="media">Nota 1</th>
                <th class="media">Nota 2</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <th rowspan="4">Exatas</th>
                <td>Matemática</td>
                <td>0.0</td>
                <td>0.0</td>
                <td>0.0</td>
            </tr>
            <tr>
                <td>Física</td>
                <td>0.0</td>
                <td>0.0</td>
                <td>0.0</td>
            </tr>
            <tr>
                <td>Química</td>
                <td>0.0</td>
                <td>0.0</td>
                <td>0.0</td>
            </tr>
            <tr>
                <td>Biologia</td>
                <td>0.0</td>
                <td>0.0</td>
                <td>0.0</td>
            </tr>
            <tr>
                <th colspan="4" class="medias">Média de Exatas</th>
                <td class="media">0.0</td>
            </tr>
            <tr>
                <th rowspan="2">Humanas</th>
                <td>História</td>
                <td>0.0</td>
                <td>0.0</td>
                <td>0.0</td>
            </tr>
            <tr>
                <td>Geografia</td>
                <td>0.0</td>
                <td>0.0</td>
                <td>0.0</td>
            </tr>
            <tr>
                <th colspan="4" class="medias">Média de humanas</th>
                <td class="media">0.0</td>
            </tr>
        </tbody>
    </table>
    
</body>
</html>
