<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Escolha uma opção</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;

font-family:Arial;
color:white;

background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
}

.box{

text-align:center;

padding:50px;

border-radius:20px;

background:rgba(255,255,255,0.05);
backdrop-filter:blur(15px);

box-shadow:0 0 40px rgba(0,0,0,0.5);

animation:fade 1.5s ease;

}

h1{

margin:0 0 10px 0;
font-size:28px;

}

p{

opacity:0.7;
font-size:16px;

}

span{

display:inline-block;
margin-top:20px;

padding:10px 20px;

border-radius:10px;

background:linear-gradient(45deg,#00c6ff,#0072ff);

animation:pulse 2s infinite;

}

@keyframes fade{

from{
opacity:0;
transform:translateY(20px);
}

to{
opacity:1;
transform:translateY(0);
}

}

@keyframes pulse{

0%{transform:scale(1)}
50%{transform:scale(1.1)}
100%{transform:scale(1)}

}

</style>
</head>

<body>

<div class="box">

<h1>escolha uma opção 🗣️🔥</h1>

<p>clique em um dos links acima   para visualizar aqui</p>

<span>aguardando seleção...</span>

</div>

</body>
</html>
