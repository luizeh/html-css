<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Glass Site</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;

background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
}

.card{
width:320px;
padding:40px;

background:rgba(255,255,255,0.1);
backdrop-filter:blur(12px);

border-radius:20px;
text-align:center;
color:white;

box-shadow:0 0 30px rgba(0,0,0,0.4);
}

h1{
margin-top:0;
}

button{

padding:12px 25px;
border:none;
border-radius:10px;

background:linear-gradient(45deg,#ff9966,#ff5e62);
color:white;
font-weight:bold;

cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
}

</style>
</head>

<body>

<div class="card">

<h1>sigma page</h1>

<p>site teste bonito</p>

<button>receba</button>

</div>

</body>
</html>
