<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>formulario</title>
</head>
<body>
    <h1>Teste de formulário</h1>
    <form action="cadastro.php" method="get" autocomplete="on">
    <p>
        <label for="inome">Nome:</label>
        <input type="text" id="inome" name="nome" placeholder="Nome completo" autocomplete="name" required>
    </p>
    <p>
        <label for="imedia">Média:</label>
        <input type="number" id="imedia" name="media" min="0" max="10" placeholder="0 a 10" autocomplete="off" step="0.1" required>
    </p>
    <p>
        <label for="imes">periodo letivo</label>
        <input type="month" id="imes" name="mes" required value="2020-07">
    </p>
    <p>
        <label for="dia">Dia da prova</label>
        <input type="date" id="idia" name="dia" required>
    </p>
    <p> 
        <label for="ihora">Hora da prova</label>
        <input type="time" id="ihora" name="hora" required>
    </p>
    <p>
        <input type="submit" value="enviar">
        <input type="reset" value="limpar">
    </p>
    </form>
</body>
</html>
